include:
  - ../../docker-compose.common.yml

services:
  vllm:
    image: vllm/vllm-openai:gemma4-cu130
    container_name: gemma4-e4b-it
    command:
      - "google/gemma-4-E4B-it"
      - "--host=0.0.0.0"
      - "--port=8000"
      - "--reasoning-parser=gemma4"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser=gemma4"
