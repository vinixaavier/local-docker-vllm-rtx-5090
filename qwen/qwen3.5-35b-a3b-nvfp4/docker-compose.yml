# docker-compose.yml - Qwen3.5-35B-A3B-NVFP4 on RTX 5090
# Using vLLM v0.17+ with native NVFP4 quantization support (no patch needed)
services:
  vllm:
    image: vllm/vllm-openai:cu130-nightly
    container_name: qwen3.5-35b-a3b-nvfp4
    restart: unless-stopped
    network_mode: host
    ipc: host
    runtime: nvidia
    shm_size: '16gb'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/vllm:/root/.cache/vllm
    env_file:
      - ../../.env
    command:
      - "apolo13x/Qwen3.5-35B-A3B-NVFP4"
      - "--host=0.0.0.0"
      - "--port=8000"
      - "--max-model-len=234567"
      - "--gpu-memory-utilization=0.89"
      - "--max-num-seqs=4"
      - "--max-num-batched-tokens=4096"
      - "--kv-cache-dtype=fp8"
      - "--reasoning-parser=qwen3"
      - "--enable-auto-tool-choice"
      - "--enable-prefix-caching"
      - "--tool-call-parser=qwen3_coder"
      - "--language-model-only"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s
